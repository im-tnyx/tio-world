name: tio_app
description: Tio Flutter phone app shell.
publish_to: none

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  tio_core:
    path: ../core
  tio_shared:
    path: ../shared
  tio_feature_auth:
    path: ../features/auth
  tio_feature_onboarding:
    path: ../features/onboarding
  tio_feature_workout:
    path: ../features/workout
  tio_feature_nutrition:
    path: ../features/nutrition
  tio_feature_coaching:
    path: ../features/coaching
  tio_feature_progress:
    path: ../features/progress
  tio_feature_profile:
    path: ../features/profile
  tio_feature_settings:
    path: ../features/settings

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "../assets/brand/dark_logo.jpg"

flutter:
  uses-material-design: true
  assets:
    - ../assets/brand/dark_logo.jpg
    - ../assets/nav_icon/
